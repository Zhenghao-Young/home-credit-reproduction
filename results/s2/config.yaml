data_dir: home-credit-default-risk
train_file: application_train.csv
test_file: application_test.csv
folds_file: data/folds.csv
results_dir: results

cv:
  n_splits: 5
  random_state: 2026

lightgbm:
  objective: binary
  metric: auc
  learning_rate: 0.03
  num_leaves: 31
  min_child_samples: 70
  feature_fraction: 0.20
  reg_lambda: 100
  n_estimators: 3000
  early_stopping_rounds: 100
  random_state: 2026
  n_jobs: 8

logistic:
  penalty: l2
  solver: liblinear
  max_iter: 1000
  class_weight: balanced
  random_state: 2026
